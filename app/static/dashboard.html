<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoGuard 儀表板</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard {
            padding: 2rem 0;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .chart-container {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }
        
        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table th {
            background: var(--surface);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .data-table tr:hover {
            background: var(--surface);
        }
        
        .control-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        
        .control-group {
            margin-bottom: 1.5rem;
        }
        
        .control-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .control-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 1rem;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .badge-success {
            background: #dcfce7;
            color: #166534;
        }
        
        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .refresh-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    🌱 PicoGuard
                </div>
                <nav class="nav">
                    <a href="/static/index.html" class="nav-link">首頁</a>
                    <a href="/static/dashboard.html" class="nav-link active">儀表板</a>
                    <a href="/docs" class="nav-link">API 文件</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main dashboard">
        <div class="container">
            <!-- 儀表板標題和控制 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 class="section-title">監控儀表板</h1>
                <div>
                    <button class="refresh-btn" onclick="refreshDashboard()">
                        🔄 重新整理
                    </button>
                    <span id="last-update" style="margin-left: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
                        最後更新: -
                    </span>
                </div>
            </div>

            <!-- 即時狀態卡片 -->
            <div class="dashboard-grid">
                <div class="chart-container">
                    <h3 class="chart-title">🌡️ 溫度趨勢</h3>
                    <canvas id="tempChart" height="200"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">💧 土壤濕度</h3>
                    <canvas id="moistureChart" height="200"></canvas>
                </div>
            </div>

            <!-- 控制面板和數據表格 -->
            <div class="dashboard-grid">
                <!-- 控制面板 -->
                <div class="control-panel">
                    <h3 class="chart-title">🎛️ 裝置控制</h3>
                    
                    <div class="control-group">
                        <label class="control-label">裝置狀態</label>
                        <div id="device-status">
                            <span class="badge badge-warning">檢查中...</span>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">澆水控制</label>
                        <button class="btn btn-primary" onclick="triggerWatering()" id="water-btn" disabled>
                            啟動澆水 (2秒)
                        </button>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">數據更新頻率</label>
                        <select class="control-input" id="update-frequency">
                            <option value="30">30 秒</option>
                            <option value="60" selected>1 分鐘</option>
                            <option value="300">5 分鐘</option>
                        </select>
                    </div>
                </div>

                <!-- 最新數據表格 -->
                <div class="chart-container">
                    <h3 class="chart-title">📊 最新數據</h3>
                    <div style="max-height: 400px; overflow-y: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>時間</th>
                                    <th>溫度</th>
                                    <th>濕度</th>
                                    <th>原始值</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body">
                                <tr>
                                    <td colspan="4" style="text-align: center; color: var(--text-secondary);">
                                        載入中...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 統計資訊 -->
            <div class="dashboard-grid" style="margin-top: 2rem;">
                <div class="chart-container">
                    <h3 class="chart-title">📈 24小時統計</h3>
                    <div id="stats-24h">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div>
                                <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary-color);" id="avg-temp">-</div>
                                <div style="color: var(--text-secondary);">平均溫度 (°C)</div>
                            </div>
                            <div>
                                <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary-color);" id="avg-moisture">-</div>
                                <div style="color: var(--text-secondary);">平均濕度 (%)</div>
                            </div>
                            <div>
                                <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary-color);" id="min-temp">-</div>
                                <div style="color: var(--text-secondary);">最低溫度 (°C)</div>
                            </div>
                            <div>
                                <div style="font-size: 1.5rem; font-weight: 600; color: var(--primary-color);" id="max-temp">-</div>
                                <div style="color: var(--text-secondary);">最高溫度 (°C)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
